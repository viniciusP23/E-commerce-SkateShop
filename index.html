<script>

    async function listarProdutos() {

        const response = await fetch("http://localhost:3000/products")
        const produtos = await response.json()


        const lista = document.getElementById("listarProdutos")

        lista.innerHTML = ""

        produtos.forEach(item => {

            const card = document.createElement("div")
            card.classList.add("card-products")


            const imageDiv = document.createElement("div")
            const img = document.createElement("img")
            img.src = `${item.image}`
            img.style.maxWidth = "100%"

            const divContent = document.createElement("div")
            divContent.classList.add("content")

            divContent.innerHTML = `
            
            <h3>${item.name}</h3>
            <p>${item.description}</p>
            <h2> R$ ${item.price}</h2>
            <p>${item.category}</p>
            
            `
            const btnBuy = document.createElement("button")
            btnBuy.innerHTML = "Adicionar ao carrinho"
            btnBuy.classList.add("btn-buy")

            imageDiv.appendChild(img)

            card.appendChild(imageDiv)
            card.appendChild(divContent)
            card.appendChild(btnBuy)
            lista.appendChild(card)

        });
    }
    listarProdutos()

    // navBar
    const navBar = document.getElementById("header")

    document.addEventListener("scroll", () => {
        let scrollTop = window.scrollY

        if (scrollTop > 0) {
            navBar.classList.add("rolar")
        } else {
            navBar.classList.remove("rolar")
        }
    })

    // Carousel

    const track = document.querySelector(".carousel-track")


    track.innerHTML += track.innerHTML

    const items = document.querySelectorAll(".carousel-track img")

    let index = 0

    function update() {
        const itemWidth = items[0].clientWidth + 20
        track.style.transform = `translateX(-${index * itemWidth}px)`
    }


    setInterval(() => {
        index++


        if (index >= items.length / 2) {
            index = 0
            track.style.transition = "none"
            update()


            track.offsetHeight

            track.style.transition = "transform 0.5s ease"
        } else {
            update()
        }
    }, 2000)

</script>
