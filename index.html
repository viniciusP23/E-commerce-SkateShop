<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="estilo.css">
    <title>SkateShop</title>
</head>

<body >

    <header>

        <h2 class="logo">Skate<span>Shop</span></h2>

        <nav class="search-box">
            <button class="btn-search"><i class="fa fa-search icon"></i></button>

            <input type="text" placeholder="BUSCAR PRODUTOS">
        </nav>

        <div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </div>

    </header>

    <div class="content">
        

    </div>
    

    
    <div id="listarProdutos"></div>
    


</body>

<script>

    async function listarProdutos() {

        const response = await fetch("http://localhost:3000/products")
        const produtos = await response.json()


        const lista = document.getElementById("listarProdutos")

        lista.innerHTML = ""

        produtos.forEach(item => {

            const card = document.createElement("div")
            card.classList.add("card-products")

          
            const imageDiv = document.createElement("div")
            const img = document.createElement("img")
            img.src = `${item.image}`
            img.style.maxWidth = "100%"

            const divContent = document.createElement("div")
            divContent.classList.add("content")

            divContent.innerHTML = `
            
            <h3>${item.name}</h3>
            <p>${item.description}</p>
            <h2> R$ ${item.price}</h2>
            <p>${item.category}</p>
            
            `
            const btnBuy = document.createElement("button")
            btnBuy.innerHTML = "Adicionar ao carrinho"
            btnBuy.classList.add("btn-buy")

            imageDiv.appendChild(img)

            card.appendChild(imageDiv)
            card.appendChild(divContent)
            card.appendChild(btnBuy)
            lista.appendChild(card)

        });
    }
    listarProdutos()

</script>

</html>
